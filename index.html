<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrizZapp | Cloud Profile</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #0b141a; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .nav { width: 100%; max-width: 450px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .user-circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #00a884; cursor: pointer; object-fit: cover; }

        .card { background: #111b21; width: 90%; max-width: 380px; border-radius: 20px; overflow: hidden; border: 1px solid #222e35; margin-top: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .banner-area { height: 140px; background: #202c33; position: relative; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; }
        .pfp-area { position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); }
        .pfp-img { width: 100px; height: 100px; border-radius: 50%; border: 5px solid #111b21; background: #202c33; object-fit: cover; }

        .content { padding: 55px 20px 25px; text-align: center; }
        .name { font-size: 1.5rem; font-weight: bold; color: #e9edef; margin-bottom: 20px; }

        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; transition: 0.2s; }
        .btn-edit { background: #202c33; color: #00a884; }
        .btn-share { background: #00a884; color: white; }
        .btn-save { background: #00e676; color: black; }

        #editor { display: none; padding: 20px; text-align: left; background: #1f2c33; border-radius: 15px; margin: 10px; }
        label { font-size: 11px; color: #8696a0; display: block; margin-top: 10px; }
        input[type="text"] { width: 100%; padding: 10px; background: #2a3942; border: none; border-radius: 8px; color: white; margin-top: 5px; }
        input[type="file"] { margin-top: 5px; font-size: 12px; color: #00a884; }

        .hidden { display: none !important; }
        .loading { padding: 50px; text-align: center; color: #00a884; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav">
        <h2 style="color: #00a884;">CrizZapp</h2>
        <div id="auth-section">
            <button id="login-btn" class="btn" style="width: auto; padding: 8px 15px;" onclick="login()">Entrar</button>
            <img id="my-mini-pfp" class="user-circle hidden" onclick="goMyProfile()">
        </div>
    </div>

    <div id="loader" class="loading hidden">Cargando perfil...</div>

    <div id="profile-card" class="card hidden">
        <div class="banner-area">
            <img id="v-banner" src="" class="banner-img">
            <div class="pfp-area">
                <img id="v-pfp" src="" class="pfp-img">
            </div>
        </div>
        <div class="content">
            <div id="v-name" class="name">Usuario</div>
            
            <div id="owner-actions" class="hidden">
                <button class="btn btn-edit" onclick="toggleEditor()">EDITAR PERFIL</button>
                <button class="btn btn-share" onclick="share()">COMPARTIR PERFIL</button>
            </div>

            <div id="editor">
                <label>APODO</label>
                <input type="text" id="i-name">
                <label>FOTO DE PERFIL</label>
                <input type="file" id="f-pfp" accept="image/*">
                <label>BANNER</label>
                <input type="file" id="f-banner" accept="image/*">
                <button class="btn btn-save" style="margin-top:20px;" onclick="uploadData()">GUARDAR EN LA NUBE</button>
            </div>
        </div>
    </div>

    <script>
        // TU CONFIGURACIÓN (Asegúrate de tener Firestore activado en tu consola Firebase)
        const firebaseConfig = {
            apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
            authDomain: "ingresa-dfec2.firebaseapp.com",
            projectId: "ingresa-dfec2",
            storageBucket: "ingresa-dfec2.appspot.com",
            messagingSenderId: "441882283200",
            appId: "1:441882283200:web:8067df85facc2d67d77125"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function goMyProfile() { window.location.href = window.location.pathname; }
        function toggleEditor() { 
            const ed = document.getElementById('editor');
            ed.style.display = (ed.style.display === 'block') ? 'none' : 'block';
        }

        // Convierte imagen a Base64 para guardarla como string en Firestore
        const toBase64 = file => new Promise((res) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
        });

        async function uploadData() {
            const user = auth.currentUser;
            if(!user) return;

            const name = document.getElementById('i-name').value;
            const pfpFile = document.getElementById('f-pfp').files[0];
            const bannerFile = document.getElementById('f-banner').files[0];

            let data = { name: name || user.displayName };
            if(pfpFile) data.pfp = await toBase64(pfpFile);
            if(bannerFile) data.banner = await toBase64(bannerFile);

            await db.collection("users").doc(user.uid).set(data, {merge: true});
            alert("¡Perfil actualizado!");
            location.reload();
        }

        function share() {
            const link = `${window.location.origin}${window.location.pathname}?id=${auth.currentUser.uid}`;
            navigator.clipboard.writeText(link);
            alert("¡Link de perfil copiado!");
        }

        // LÓGICA DE CARGA
        auth.onAuthStateChanged(async (user) => {
            const params = new URLSearchParams(window.location.search);
            const viewId = params.get('id');

            if (user) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('my-mini-pfp').classList.remove('hidden');
                document.getElementById('my-mini-pfp').src = user.photoURL;
            }

            let targetId = viewId || (user ? user.uid : null);

            if (targetId) {
                document.getElementById('loader').classList.remove('hidden');
                const doc = await db.collection("users").doc(targetId).get();
                
                if (doc.exists) {
                    const d = doc.data();
                    document.getElementById('v-name').innerText = d.name;
                    document.getElementById('v-pfp').src = d.pfp || "";
                    document.getElementById('v-banner').src = d.banner || "";
                    document.getElementById('i-name').value = d.name;
                } else if (user && targetId === user.uid) {
                    // Perfil nuevo para el usuario logueado
                    document.getElementById('v-name').innerText = user.displayName;
                    document.getElementById('v-pfp').src = user.photoURL;
                    document.getElementById('i-name').value = user.displayName;
                }

                if (user && targetId === user.uid) {
                    document.getElementById('owner-actions').classList.remove('hidden');
                }

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('profile-card').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
