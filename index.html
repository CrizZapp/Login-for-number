<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrizZapp | Full Scroll</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100%; width: 100%; overflow: hidden;
            background-color: #0b141a; font-family: sans-serif; color: white;
        }

        /* HEADER */
        header { 
            position: fixed; top: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 100;
        }
        .mini-pfp { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #00a884; object-fit: cover; }

        /* CONTENEDOR PRINCIPAL DE SCROLL */
        #main-container {
            height: 100vh; width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* EL TRUCO DEL SCROLLING TIKTOK */
        }

        /* CADA SECCIÓN (PERFIL Y POSTS) */
        section {
            height: 100vh; width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* ESTILO DEL PERFIL (PRIMERA PANTALLA) */
        .profile-screen { background: #111b21; }
        .banner { position: absolute; top: 0; width: 100%; height: 35%; background: #2a3942; overflow: hidden; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info { text-align: center; z-index: 10; margin-top: 50px; }
        .big-pfp { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #00a884; object-fit: cover; margin-bottom: 15px; }
        .name { font-size: 1.8rem; font-weight: bold; color: #00a884; }
        .bio { color: #8696a0; margin: 10px 20px; font-size: 15px; }
        .stats { color: #00e676; font-weight: bold; margin-bottom: 20px; }

        /* ESTILO DE LOS POSTS (SIGUIENTES PANTALLAS) */
        .post-screen { background: black; }
        .post-img { width: 100%; height: 100%; object-fit: contain; }
        
        .post-overlay {
            position: absolute; bottom: 80px; left: 15px; right: 70px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .post-desc { font-size: 16px; margin-top: 5px; }

        /* BOTONES DE ACCIÓN LADO DERECHO */
        .side-actions {
            position: absolute; right: 10px; bottom: 100px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .action-item { text-align: center; }
        .btn-icon { 
            width: 45px; height: 45px; background: rgba(255,255,255,0.1); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer;
        }

        /* BOTÓN + FLOTANTE */
        .fab { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px; background: #00a884; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; border: none; z-index: 200;
        }

        /* MODALES */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
        .modal-c { background: #111b21; padding: 20px; border-radius: 15px; border: 1px solid #00a884; width: 100%; max-width: 360px; }
        input, textarea { width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 10px; color: white; margin: 10px 0; outline: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; color:#00a884; font-size: 1.2rem;">CrizZapp</div>
        <div id="nav-user"></div>
    </header>

    <div id="main-container">
        <section class="profile-screen">
            <div class="banner"><img id="v-banner" src=""></div>
            <div class="profile-info">
                <img id="v-pfp" class="big-pfp" src="">
                <div id="v-name" class="name">Cargando...</div>
                <div id="v-bio" class="bio">...</div>
                <div class="stats"><span id="f-count">0 Seguidores</span></div>
                <div id="profile-btns"></div>
            </div>
            <div style="position: absolute; bottom: 20px; font-size: 12px; color: #00a884;">Desliza hacia arriba para ver posts ↑</div>
        </section>

        <div id="dynamic-posts"></div>
    </div>

    <button id="add-btn" class="fab hidden" onclick="openM('m-post')">+</button>

    <div id="m-post" class="modal">
        <div class="modal-c">
            <h3 style="color:#00a884">Nuevo Post</h3>
            <input type="file" id="post-img-file" accept="image/*">
            <textarea id="post-desc-in" placeholder="¿Qué onda?"></textarea>
            <button style="width:100%; padding:10px; background:#00a884; color:white; border:none; border-radius:20px;" onclick="uploadPost()">PUBLICAR</button>
            <button style="width:100%; padding:10px; background:transparent; color:white; border:none; margin-top:10px;" onclick="closeM()">Cerrar</button>
        </div>
    </div>

<script>
    // Configuración Firebase (La misma que usás vos)
    const firebaseConfig = {
        apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
        authDomain: "ingresa-dfec2.firebaseapp.com",
        databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
        projectId: "ingresa-dfec2",
        storageBucket: "ingresa-dfec2.appspot.com",
        messagingSenderId: "441882283200",
        appId: "1:441882283200:web:8067df85facc2d67d77125"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const params = new URLSearchParams(window.location.search);
    const viewId = params.get('id');

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    const toBase64 = f => new Promise(res => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.readAsDataURL(f);
    });

    async function uploadPost() {
        const u = auth.currentUser;
        const file = document.getElementById('post-img-file').files[0];
        const desc = document.getElementById('post-desc-in').value;
        if(!file) return alert("Sube una foto");
        const b64 = await toBase64(file);
        db.ref('posts/'+u.uid).push({ img: b64, desc, likes: 0, time: Date.now() }).then(() => location.reload());
    }

    function darLike(postId, ownerId) {
        const user = auth.currentUser;
        if(!user) return alert("Logueate!");
        const postRef = db.ref(`posts/${ownerId}/${postId}/likes`);
        postRef.transaction(c => (c || 0) + 1);
    }

    auth.onAuthStateChanged(user => {
        const target = viewId || (user ? user.uid : null);
        
        if(user) {
            document.getElementById('nav-user').innerHTML = `<img src="${user.photoURL}" class="mini-pfp" onclick="window.location.search=''">`;
            if(target === user.uid) document.getElementById('add-btn').classList.remove('hidden');
        }

        if(target) {
            // Datos del Perfil
            db.ref('perfiles_google/'+target).on('value', snap => {
                const d = snap.val() || {};
                document.getElementById('v-name').innerText = d.name || "Usuario";
                document.getElementById('v-bio').innerText = d.bio || "Holaaa :D";
                document.getElementById('v-pfp').src = d.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('v-banner').src = d.banner || "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000";
            });

            // CARGA DE POSTS CON SCROLLING TIPO TIKTOK
            db.ref('posts/'+target).on('value', snap => {
                const cont = document.getElementById('dynamic-posts');
                cont.innerHTML = "";
                snap.forEach(c => {
                    const p = c.val();
                    const pid = c.key;
                    cont.innerHTML = `
                        <section class="post-screen">
                            <img class="post-img" src="${p.img}">
                            <div class="side-actions">
                                <div class="action-item">
                                    <div class="btn-icon" onclick="darLike('${pid}', '${target}')">👍</div>
                                    <div style="font-size:12px; margin-top:5px;">${p.likes || 0}</div>
                                </div>
                                <div class="action-item">
                                    <div class="btn-icon" onclick="alert('Link copiado')">🔗</div>
                                </div>
                            </div>
                            <div class="post-overlay">
                                <div style="font-weight:bold; color:#00a884;">@${document.getElementById('v-name').innerText}</div>
                                <div class="post-desc">${p.desc}</div>
                            </div>
                        </section>
                    ` + cont.innerHTML;
                });
            });
        }
    });
</script>
</body>
</html>
