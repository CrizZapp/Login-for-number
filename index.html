<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrizZapp | Mi Perfil</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #020406; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .card { background: #0d1218; border-radius: 20px; border: 1px solid #1f2937; width: 100%; max-width: 380px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- BANNER Y FOTO --- */
        .profile-header { position: relative; height: 130px; background: #1a222c; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; }
        .user-img-container { position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); }
        .user-img { width: 100px; height: 100px; border-radius: 50%; border: 5px solid #0d1218; object-fit: cover; background: #0d1218; }

        /* --- CONTENIDO --- */
        .profile-body { padding: 60px 25px 25px; text-align: center; }
        .nickname { font-size: 1.5rem; font-weight: bold; color: #4facfe; margin-bottom: 20px; }

        /* --- FORMULARIO DE EDICIÓN --- */
        .edit-section { background: #161d26; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left; }
        label { font-size: 0.75rem; color: #8696a0; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: #0d1218; border: 1px solid #334155; padding: 8px; border-radius: 6px; color: #fff; margin-bottom: 10px; outline: none; }
        input:focus { border-color: #4facfe; }

        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-google { background: #fff; color: #000; }
        .btn-save { background: #4facfe; color: #fff; margin-top: 5px; }
        
        .logout-link { margin-top: 15px; font-size: 0.8em; color: #ff3d00; cursor: pointer; display: inline-block; }
        .content { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="main-box" class="content">
            <div class="profile-header">
                <img id="view-banner" src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000&auto=format&fit=crop" class="banner-img">
                <div class="user-img-container">
                    <img id="view-pfp" src="" class="user-img">
                </div>
            </div>

            <div class="profile-body">
                <div id="view-name" class="nickname">Cargando...</div>

                <div class="edit-section">
                    <label>Apodo Personalizado</label>
                    <input type="text" id="input-name" placeholder="Tu nuevo apodo">
                    
                    <label>URL de Foto de Perfil</label>
                    <input type="text" id="input-pfp" placeholder="https://imagen.com/foto.png">
                    
                    <label>URL de Banner</label>
                    <input type="text" id="input-banner" placeholder="https://imagen.com/banner.png">
                    
                    <button onclick="saveChanges()" class="btn btn-save">GUARDAR CAMBIOS</button>
                </div>

                <p onclick="logout()" class="logout-link">Cerrar Sesión</p>
            </div>
        </div>

        <div id="login-box" style="padding: 50px 30px; text-align: center;">
            <h1 style="color: #4facfe; margin-bottom: 10px;">CrizZapp</h1>
            <p style="color: #8696a0; margin-bottom: 30px;">Inicia sesión para personalizar tu perfil</p>
            <button class="btn btn-google" onclick="login()">ENTRAR CON GOOGLE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
            authDomain: "ingresa-dfec2.firebaseapp.com",
            projectId: "ingresa-dfec2",
            storageBucket: "ingresa-dfec2.appspot.com",
            messagingSenderId: "441882283200",
            appId: "1:441882283200:web:8067df85facc2d67d77125"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function login() {
            auth.signInWithPopup(provider).catch(e => alert("Error: " + e.message));
        }

        function logout() {
            auth.signOut();
        }

        // Función para guardar los datos en el navegador del usuario
        function saveChanges() {
            const newName = document.getElementById('input-name').value;
            const newPfp = document.getElementById('input-pfp').value;
            const newBanner = document.getElementById('input-banner').value;

            localStorage.setItem('custom_name', newName);
            localStorage.setItem('custom_pfp', newPfp);
            localStorage.setItem('custom_banner', newBanner);

            updateUI(); // Refresca la vista
            alert("¡Perfil actualizado con éxito!");
        }

        function updateUI() {
            const user = auth.currentUser;
            if (!user) return;

            // Prioridad: 1. Lo guardado en localStorage, 2. Lo de Google
            const finalName = localStorage.getItem('custom_name') || user.displayName;
            const finalPfp = localStorage.getItem('custom_pfp') || user.photoURL;
            const finalBanner = localStorage.getItem('custom_banner') || "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000&auto=format&fit=crop";

            document.getElementById('view-name').innerText = finalName;
            document.getElementById('view-pfp').src = finalPfp;
            document.getElementById('view-banner').src = finalBanner;

            // Llenar los inputs con lo que está actual por si quiere volver a editar
            document.getElementById('input-name').value = finalName;
            document.getElementById('input-pfp').value = finalPfp;
            document.getElementById('input-banner').value = finalBanner;
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-box').style.display = 'block';
                updateUI();
            } else {
                document.getElementById('login-box').style.display = 'block';
                document.getElementById('main-box').style.display = 'none';
            }
        });
    </script>
</body>
</html>
