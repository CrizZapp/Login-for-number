<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrizZapp | Social App</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            margin: 0; font-family: sans-serif; background-color: #0b141a; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            color: white; overflow-x: hidden;
        }

        header { width: 100%; height: 60px; background: #202c33; padding: 0 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00a884; position: sticky; top:0; z-index: 100; gap: 10px; }
        .mini-pfp { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #00a884; object-fit: cover; cursor: pointer; flex-shrink: 0; }

        .search-container { flex-grow: 1; position: relative; }
        .search-input { width: 100%; padding: 8px 15px; border-radius: 20px; border: 1px solid #2a3942; background: #111b21; color: white; outline: none; font-size: 14px; }
        
        #search-results { position: absolute; top: 45px; width: 100%; background: #111b21; border-radius: 10px; border: 1px solid #00a884; max-height: 300px; overflow-y: auto; display: none; z-index: 500; }
        .res-item { padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2a3942; cursor: pointer; }
        .res-pfp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }

        .profile-card { background: #111b21; width: 95%; max-width: 450px; border-radius: 0 0 20px 20px; border: 1px solid #00a884; border-top: none; overflow: hidden; position: relative; margin: 0 auto 20px; padding-bottom: 20px; }
        .banner { height: 130px; background: #2a3942; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        .pfp-wrap { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); }
        .pfp-wrap img { width: 95px; height: 95px; border-radius: 50%; border: 4px solid #111b21; object-fit: cover; background: #202c33; }
        
        .info { margin-top: 55px; text-align: center; padding: 0 15px; }
        .name-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .name { font-size: 1.5rem; font-weight: bold; color: #00a884; }
        .verified-badge { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; background-color: #00a884; color: #111b21; border-radius: 50%; font-size: 11px; font-weight: bold; }
        .share-p-btn { font-size: 18px; cursor: pointer; color: #00a884; background: rgba(0,168,132,0.1); padding: 5px; border-radius: 50%; }

        .btn-action { padding: 10px 25px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; width: 80%; }
        .btn-edit { background: transparent; border: 1px solid #00a884; color: white; }
        .btn-follow { background: #00a884; color: white; }

        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 100%; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .grid-item { aspect-ratio: 1/1; background: #2a3942; overflow: hidden; position: relative; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        #feed-view { position: fixed; inset: 0; background: black; z-index: 1000; display: none; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .post-fullscreen { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        .post-fullscreen img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .post-data { position: absolute; bottom: 30px; left: 15px; right: 80px; text-shadow: 1px 1px 5px black; }
        .post-actions { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .action-btn { background: rgba(255,255,255,0.15); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-c { background: #111b21; padding: 20px; border-radius: 15px; border: 1px solid #00a884; width: 100%; max-width: 380px; }
        input, textarea { width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 10px; color: white; margin: 10px 0; outline: none; }
        
        .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: #00a884; border-radius: 50%; border: none; font-size: 30px; color: white; z-index: 90; }
    </style>
</head>
<body>

    <header>
        <div id="logo-crizz" style="color:#00a884; font-weight:bold; cursor:pointer;">CrizZapp</div>
        <div class="search-container">
            <input type="text" id="main-search" class="search-input" placeholder="Buscar usuarios o frases..." oninput="searchApp(this.value)">
            <div id="search-results"></div>
        </div>
        <div id="nav-user"></div>
    </header>

    <div id="profile-view">
        <div class="profile-card">
            <div class="banner"><img id="v-banner" src=""></div>
            <div class="pfp-wrap"><img id="v-pfp" src=""></div>
            <div class="info">
                <div class="name-row">
                    <div id="v-name" class="name">Usuario</div>
                    <span class="share-p-btn" onclick="shareProfile()">🔗</span>
                </div>
                <div id="v-bio" style="color:#8696a0; font-size:14px; margin:8px 0;">Cargando...</div>
                <div style="color:#00e676; font-size:13px; font-weight:bold;"><span id="f-count">0 Seguidores</span></div>
                <div id="profile-btns"></div>
            </div>
        </div>
        <div class="grid-container" id="post-grid"></div>
    </div>

    <div id="feed-view">
        <div style="position:fixed; top:20px; left:20px; z-index:1100; font-size:25px; background:rgba(0,0,0,0.5); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;" onclick="document.getElementById('feed-view').style.display='none'">←</div>
        <div id="feed-content"></div>
    </div>

    <button id="add-btn" class="fab" style="display:none;" onclick="openM('m-post')">+</button>

    <div id="m-edit" class="modal"><div class="modal-c">
        <h3 style="color:#00a884">Ajustes de Perfil</h3>
        <input type="text" id="ed-name" placeholder="Tu Apodo">
        <textarea id="ed-bio" placeholder="Biografía..."></textarea>
        <label style="font-size:11px; color:#8696a0">FOTO DE PERFIL</label>
        <input type="file" id="ed-pfp" accept="image/*">
        <label style="font-size:11px; color:#8696a0">BANNER</label>
        <input type="file" id="ed-banner" accept="image/*">
        <button class="btn-action btn-follow" style="width:100%" onclick="saveProfile()">GUARDAR CAMBIOS</button>
        <button class="btn-action" style="width:100%; background:#ae2012; color:white; margin-top:10px;" onclick="logout()">CERRAR SESIÓN</button>
        <button class="btn-action" style="width:100%; color:white;" onclick="closeM()">Cancelar</button>
    </div></div>

    <div id="m-admin" class="modal"><div class="modal-c" style="border-color: #ff0055;">
        <h3 style="color:#ff0055">CrizZapPro Admin</h3>
        <input type="password" id="admin-pin" placeholder="PIN Secreto">
        <div id="admin-tools" style="display:none;">
            <input type="text" id="admin-search-user" placeholder="Nombre del usuario..." oninput="searchAdminUser(this.value)">
            <div id="admin-res" style="max-height:100px; overflow-y:auto; background:#0b141a; border-radius:5px; margin-bottom:10px;"></div>
            <p id="selected-user-text" style="font-size:10px; color:#00a884;"></p>
            <input type="hidden" id="verify-uid">
            <button class="btn-action" style="background:#00a884; color:white; width:100%;" onclick="makeVerified()">VERIFICAR</button>
            <button class="btn-action" style="background:#ae2012; color:white; width:100%; margin-top:5px;" onclick="removeVerified()">QUITAR VERIFICADO</button>
        </div>
        <button id="btn-unlock" class="btn-action btn-edit" style="width:100%" onclick="unlockAdmin()">ENTRAR</button>
        <button class="btn-action" style="width:100%; color:white;" onclick="closeM()">Salir</button>
    </div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
        authDomain: "ingresa-dfec2.firebaseapp.com",
        databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
        projectId: "ingresa-dfec2",
        storageBucket: "ingresa-dfec2.appspot.com",
        messagingSenderId: "441882283200",
        appId: "1:441882283200:web:8067df85facc2d67d77125"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const params = new URLSearchParams(window.location.search);
    const viewId = params.get('id');
    const postIdParam = params.get('post');

    function openM(id) { document.getElementById(id).style.display='flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function logout() { if(confirm("¿Cerrar sesión?")) auth.signOut().then(() => window.location.search = ""); }

    // --- ADMIN POR NOMBRE ---
    function searchAdminUser(val) {
        const resBox = document.getElementById('admin-res');
        if(val.length < 2) return resBox.innerHTML = "";
        db.ref('perfiles_google').once('value', snap => {
            let html = "";
            snap.forEach(u => {
                if(u.val().name?.toLowerCase().includes(val.toLowerCase())) {
                    html += `<div style="padding:5px; cursor:pointer;" onclick="selectUserAdmin('${u.key}', '${u.val().name}')">${u.val().name}</div>`;
                }
            });
            resBox.innerHTML = html;
        });
    }
    function selectUserAdmin(uid, name) {
        document.getElementById('verify-uid').value = uid;
        document.getElementById('selected-user-text').innerText = "Seleccionado: " + name;
        document.getElementById('admin-res').innerHTML = "";
    }

    // --- RESTO DE FUNCIONES (SCROLL, COMPARTIR, ETC) ---
    function shareProfile() {
        navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?id=" + (viewId || auth.currentUser.uid));
        alert("Enlace copiado 👤");
    }

    function sharePost(pid) {
        navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?id=" + (viewId || auth.currentUser.uid) + "&post=" + pid);
        alert("Post copiado 🔗");
    }

    function searchApp(val) {
        const box = document.getElementById('search-results');
        if (val.length < 2) { box.style.display = 'none'; return; }
        box.style.display = 'block';
        let results = "";
        db.ref('perfiles_google').once('value', snap => {
            snap.forEach(u => {
                const d = u.val();
                if (d.name?.toLowerCase().includes(val.toLowerCase())) {
                    results += `<div class="res-item" onclick="window.location.search='?id=${u.key}'">
                        <img class="res-pfp" src="${d.pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                        <div>${d.name}</div>
                    </div>`;
                }
            });
            box.innerHTML = results || "Sin resultados";
        });
    }

    auth.onAuthStateChanged(user => {
        const target = viewId || (user ? user.uid : null);
        if(user) {
            document.getElementById('nav-user').innerHTML = `<img src="${user.photoURL}" class="mini-pfp" onclick="window.location.search=''">`;
            if(target === user.uid) document.getElementById('add-btn').style.display = 'block';
        }
        
        if(target) {
            db.ref('perfiles_google/'+target).on('value', snap => {
                const d = snap.val() || {};
                db.ref('verificados/'+target).on('value', vSnap => {
                    const check = vSnap.exists() ? '<span class="verified-badge">✓</span>' : '';
                    document.getElementById('v-name').innerHTML = (d.name || "Usuario") + check;
                });
                document.getElementById('v-bio').innerText = d.bio || "Sin biografía.";
                document.getElementById('v-pfp').src = d.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('v-banner').src = d.banner || "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000";
                
                let btns = (user && target === user.uid) ? `<button class="btn-action btn-edit" onclick="openM('m-edit')">AJUSTES</button>` : `<button id="f-btn" class="btn-action btn-follow">SEGUIR</button>`;
                document.getElementById('profile-btns').innerHTML = btns;
            });

            db.ref('posts/'+target).on('value', snap => {
                const g = document.getElementById('post-grid'), f = document.getElementById('feed-content');
                g.innerHTML = ""; f.innerHTML = "";
                snap.forEach(c => {
                    const p = c.val(), pid = c.key;
                    g.innerHTML = `<div class="grid-item" onclick="document.getElementById('feed-view').style.display='block'; document.getElementById('${pid}').scrollIntoView();"><img src="${p.img}"></div>` + g.innerHTML;
                    f.innerHTML = `<div class="post-fullscreen" id="${pid}"><img src="${p.img}"><div class="post-actions"><div class="action-btn" onclick="sharePost('${pid}')">🔗</div></div><div class="post-data"><b>@${target}</b><p>${p.desc}</p></div></div>` + f.innerHTML;
                });
            });
        }
    });

    // --- RE-INSTALACIÓN DE LOGO ADMIN ---
    let clicks = 0;
    document.getElementById('logo-crizz').onclick = () => { clicks++; if(clicks === 5) openM('m-admin'); setTimeout(()=>clicks=0, 2000); };
    function unlockAdmin() { if(document.getElementById('admin-pin').value==="2026") document.getElementById('admin-tools').style.display='block'; }
    function makeVerified() { const uid=document.getElementById('verify-uid').value; if(uid) db.ref('verificados/'+uid).set(true).then(()=>alert("OK")); }
</script>
</body>
</html>
