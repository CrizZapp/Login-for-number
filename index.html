<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrizZapp | Perfil</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            margin: 0; font-family: sans-serif; background-color: #0b141a; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        /* NAVBAR */
        header { 
            width: 100%; max-width: 450px; background: #202c33; padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00a884;
        }
        .mini-pfp { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #00a884; cursor: pointer; object-fit: cover; background: #111b21; }
        .btn-nav-login { background: #00a884; color: white; border: none; padding: 5px 12px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* TARJETA */
        .card { 
            background: #111b21; width: 90%; max-width: 380px; border-radius: 20px; 
            border: 1px solid #00a884; overflow: hidden; margin-top: 30px; box-shadow: 0 0 20px rgba(0, 168, 132, 0.2);
        }

        .banner-h { position: relative; height: 130px; background: #2a3942; }
        #v-banner { width: 100%; height: 100%; object-fit: cover; }
        
        .pfp-h { position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); }
        #v-pfp { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #111b21; object-fit: cover; background: #202c33; }

        .info { padding: 55px 20px 25px; text-align: center; }
        #v-name { font-size: 1.5rem; font-weight: bold; color: #00a884; margin-bottom: 20px; }

        .btn { padding: 12px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-edit { background: #202c33; color: white; border: 1px solid #00a884; }
        .btn-share { background: #00a884; color: white; }

        #editor { display: none; text-align: left; background: #1f2c33; padding: 15px; border-radius: 15px; border: 1px solid #00a884; margin-top: 15px; }
        label { font-size: 11px; color: #8696a0; font-weight: bold; display: block; margin-top: 10px; }
        input[type="text"] { width: 100%; padding: 10px; background: #2a3942; border: none; border-radius: 8px; color: white; margin-top: 5px; outline: none; }
        
        #login-overlay { position: fixed; inset: 0; background: #111b21; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay" class="hidden">
        <div style="text-align: center; background: #202c33; padding: 40px; border-radius: 20px; border: 1px solid #00a884;">
            <h1 style="color:#00a884; margin-bottom: 20px;">CrizZapp</h1>
            <button class="btn btn-share" onclick="login()">ENTRAR CON GOOGLE</button>
        </div>
    </div>

    <header>
        <div style="font-weight: bold; color:#00a884; cursor: pointer;" onclick="verMiPerfil()">CrizZapp</div>
        <div id="nav-actions">
            </div>
    </header>

    <div id="profile-card" class="card">
        <div class="banner-h">
            <img id="v-banner" src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000">
            <div class="pfp-h">
                <img id="v-pfp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            </div>
        </div>
        <div class="info">
            <div id="v-name">Cargando...</div>
            
            <div id="owner-tools" class="hidden">
                <button class="btn btn-edit" onclick="toggleEdit()">EDITAR PERFIL</button>
                <button class="btn btn-share" onclick="compartir()">COMPARTIR PERFIL</button>
            </div>

            <div id="editor">
                <label>APODO</label>
                <input type="text" id="i-name">
                <label>FOTO PERFIL</label>
                <input type="file" id="f-pfp" accept="image/*">
                <label>BANNER</label>
                <input type="file" id="f-banner" accept="image/*">
                <button class="btn btn-share" style="background:#00e676; color:black; margin-top:15px;" onclick="guardar()">GUARDAR CAMBIOS</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
        authDomain: "ingresa-dfec2.firebaseapp.com",
        databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
        projectId: "ingresa-dfec2",
        storageBucket: "ingresa-dfec2.appspot.com",
        messagingSenderId: "441882283200",
        appId: "1:441882283200:web:8067df85facc2d67d77125"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function verMiPerfil() { window.location.search = ""; }
    function toggleEdit() {
        const ed = document.getElementById('editor');
        ed.style.display = (ed.style.display === 'block') ? 'none' : 'block';
    }

    const toBase64 = file => new Promise(res => {
        const reader = new FileReader();
        reader.onload = e => res(e.target.result);
        reader.readAsDataURL(file);
    });

    async function guardar() {
        const user = auth.currentUser;
        if(!user) return;
        const name = document.getElementById('i-name').value;
        const pFile = document.getElementById('f-pfp').files[0];
        const bFile = document.getElementById('f-banner').files[0];

        let data = { name: name || user.displayName };
        if(pFile) data.pfp = await toBase64(pFile);
        if(bFile) data.banner = await toBase64(bFile);

        db.ref('perfiles_google/' + user.uid).update(data).then(() => {
            alert("¡Perfil actualizado!");
            location.reload();
        });
    }

    function compartir() {
        const link = window.location.origin + window.location.pathname + "?id=" + auth.currentUser.uid;
        navigator.clipboard.writeText(link);
        alert("¡Link de perfil copiado!");
    }

    // LÓGICA PRINCIPAL
    const params = new URLSearchParams(window.location.search);
    const viewId = params.get('id');

    auth.onAuthStateChanged(user => {
        const navActions = document.getElementById('nav-actions');
        
        // Actualizar Navbar
        if (user) {
            navActions.innerHTML = `<img src="${user.photoURL}" class="mini-pfp" onclick="verMiPerfil()">`;
            document.getElementById('login-overlay').classList.add('hidden');
        } else {
            navActions.innerHTML = `<button class="btn-nav-login" onclick="login()">LOGIN</button>`;
            // Si no hay ID y no hay usuario, mostrar login forzado
            if (!viewId) {
                document.getElementById('login-overlay').classList.remove('hidden');
            }
        }

        const target = viewId || (user ? user.uid : null);

        if (target) {
            db.ref('perfiles_google/' + target).on('value', snap => {
                const d = snap.val() || {};
                
                // Mostrar datos
                document.getElementById('v-name').innerText = d.name || "Usuario";
                document.getElementById('v-pfp').src = d.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                if(d.banner) document.getElementById('v-banner').src = d.banner;

                // Si soy el dueño, mostrar herramientas
                if (user && target === user.uid) {
                    document.getElementById('owner-tools').classList.remove('hidden');
                    document.getElementById('i-name').value = d.name || user.displayName;
                } else {
                    document.getElementById('owner-tools').classList.add('hidden');
                    document.getElementById('editor').style.display = 'none';
                }
            });
        }
    });
</script>
</body>
</html>
