<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrizZapp | Feed Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            margin: 0; font-family: sans-serif; background-color: #0b141a; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        header { width: 100%; max-width: 500px; background: #202c33; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00a884; position: sticky; top:0; z-index: 100; }
        .mini-pfp { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #00a884; cursor: pointer; object-fit: cover; background: #111b21; }

        .profile-card { background: #111b21; width: 92%; max-width: 400px; border-radius: 20px; border: 1px solid #00a884; overflow: hidden; margin-top: 25px; position: relative; }
        .banner-h { height: 120px; background: #2a3942; width: 100%; overflow: hidden; }
        #v-banner { width: 100%; height: 100%; object-fit: cover; }
        .pfp-h { position: absolute; top: 75px; left: 50%; transform: translateX(-50%); width: 90px; height: 90px; }
        #v-pfp { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #111b21; object-fit: cover; }

        .info { padding: 50px 20px 20px; text-align: center; }
        #v-name { font-size: 1.4rem; font-weight: bold; color: #00a884; }
        #v-bio { color: #8696a0; font-size: 13px; margin: 8px 0; }
        .stats { color: #00e676; font-size: 12px; font-weight: bold; margin-bottom: 10px; }

        .btn { padding: 10px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-edit { background: transparent; color: white; border: 1px solid #00a884; }
        .btn-follow { background: #00a884; color: white; }

        /* VISTA DE PORTADAS (GRID) */
        .grid-title { width: 92%; max-width: 400px; margin: 20px 0 10px; font-size: 14px; color: #00a884; font-weight: bold; border-bottom: 1px solid #2a3942; padding-bottom: 5px; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 92%; max-width: 400px; }
        .grid-item { aspect-ratio: 1/1; background: #2a3942; overflow: hidden; cursor: pointer; border-radius: 4px; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* VISTA DE SCROLL (FEED) */
        .feed-scroll { width: 92%; max-width: 400px; margin-top: 20px; padding-bottom: 100px; }
        .post-card { background: #111b21; border-radius: 15px; border: 1px solid #2a3942; margin-bottom: 25px; overflow: hidden; }
        .post-card img { width: 100%; display: block; }
        .post-info { padding: 15px; }
        .post-desc { font-size: 14px; margin-bottom: 10px; }
        .post-actions { display: flex; align-items: center; gap: 10px; border-top: 1px solid #2a3942; padding-top: 10px; }
        .like-btn { cursor: pointer; font-size: 20px; transition: transform 0.2s; }
        .like-btn:active { transform: scale(1.3); }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: #00a884; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; border: none; z-index: 90; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
        .modal-c { background: #111b21; padding: 20px; border-radius: 15px; border: 1px solid #00a884; width: 100%; max-width: 360px; }
        input, textarea { width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 10px; color: white; margin: 10px 0; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; color:#00a884; font-size: 1.1rem; cursor: pointer;" onclick="window.location.search=''">CrizZapp</div>
        <div id="nav-btn-cont"></div>
    </header>

    <div class="profile-card">
        <div class="banner-h"><img id="v-banner" src=""></div>
        <div class="pfp-h"><img id="v-pfp" src=""></div>
        <div class="info">
            <div id="v-name">Cargando...</div>
            <div id="v-bio">...</div>
            <div class="stats"><span id="f-count">0 Seguidores</span></div>
            <div id="profile-actions"></div>
        </div>
    </div>

    <div class="grid-title">PUBLICACIONES</div>
    <div class="post-grid" id="grid-cont"></div>

    <div class="feed-scroll" id="feed-cont">
        </div>

    <button id="add-btn" class="fab hidden" onclick="openM('m-post')">+</button>

    <div id="m-post" class="modal">
        <div class="modal-c">
            <h3 style="color:#00a884">Subir Foto</h3>
            <input type="file" id="post-img" accept="image/*">
            <textarea id="post-desc" placeholder="Escribe algo..."></textarea>
            <button class="btn btn-follow" onclick="uploadPost()">PUBLICAR</button>
            <button class="btn" style="color:#8696a0" onclick="closeM()">Cancelar</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
        authDomain: "ingresa-dfec2.firebaseapp.com",
        databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
        projectId: "ingresa-dfec2",
        storageBucket: "ingresa-dfec2.appspot.com",
        messagingSenderId: "441882283200",
        appId: "1:441882283200:web:8067df85facc2d67d77125"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const params = new URLSearchParams(window.location.search);
    const viewId = params.get('id');

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    const toBase64 = f => new Promise(res => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.readAsDataURL(f);
    });

    async function uploadPost() {
        const u = auth.currentUser;
        const file = document.getElementById('post-img').files[0];
        const desc = document.getElementById('post-desc').value;
        if(!file) return alert("Falta la foto");
        const b64 = await toBase64(file);
        db.ref('posts/'+u.uid).push({ img: b64, desc, likes: 0, time: Date.now() }).then(() => location.reload());
    }

    function darLike(postId, ownerId) {
        const user = auth.currentUser;
        if(!user) return alert("Inicia sesión para dar like");
        const likeRef = db.ref(`posts/${ownerId}/${postId}/likes_users/${user.uid}`);
        
        likeRef.get().then(snap => {
            const postRef = db.ref(`posts/${ownerId}/${postId}/likes`);
            postRef.transaction(current => {
                if (snap.exists()) {
                    likeRef.remove();
                    return (current || 1) - 1;
                } else {
                    likeRef.set(true);
                    return (current || 0) + 1;
                }
            });
        });
    }

    auth.onAuthStateChanged(user => {
        const target = viewId || (user ? user.uid : null);
        if(user) {
            document.getElementById('nav-btn-cont').innerHTML = `<img src="${user.photoURL}" class="mini-pfp" onclick="window.location.search=''">`;
            if(target === user.uid) document.getElementById('add-btn').classList.remove('hidden');
        }

        if(target) {
            // Cargar Perfil
            db.ref('perfiles_google/'+target).on('value', snap => {
                const d = snap.val() || {};
                document.getElementById('v-name').innerText = d.name || "Usuario";
                document.getElementById('v-bio').innerText = d.bio || "Bio vacía.";
                document.getElementById('v-pfp').src = d.pfp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('v-banner').src = d.banner || "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000";
            });

            // Cargar Posts (Grid y Scroll)
            db.ref('posts/'+target).on('value', snap => {
                const grid = document.getElementById('grid-cont');
                const feed = document.getElementById('feed-cont');
                grid.innerHTML = ""; feed.innerHTML = "";

                snap.forEach(c => {
                    const p = c.val();
                    const pid = c.key;
                    
                    // Portada
                    grid.innerHTML = `<div class="grid-item" onclick="document.getElementById('${pid}').scrollIntoView({behavior:'smooth'})"><img src="${p.img}"></div>` + grid.innerHTML;
                    
                    // Feed Completo
                    feed.innerHTML = `
                        <div class="post-card" id="${pid}">
                            <img src="${p.img}">
                            <div class="post-info">
                                <div class="post-desc">${p.desc}</div>
                                <div class="post-actions">
                                    <span class="like-btn" onclick="darLike('${pid}', '${target}')">👍</span>
                                    <span style="font-size:13px; font-weight:bold;">${p.likes || 0} likes</span>
                                </div>
                            </div>
                        </div>
                    ` + feed.innerHTML;
                });
            });
        }
    });
</script>
</body>
</html>
