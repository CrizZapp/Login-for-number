<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrizZapp | Perfil</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #020406; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { background: #0d1218; border-radius: 20px; border: 1px solid #1f2937; width: 360px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }

        /* --- CABECERA --- */
        .header { position: relative; height: 140px; }
        .banner { width: 100%; height: 100%; object-fit: cover; background: #1a222c; }
        .pfp-container { position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); }
        .pfp { width: 100px; height: 100px; border-radius: 50%; border: 5px solid #0d1218; object-fit: cover; background: #1a222c; }

        /* --- CONTENIDO --- */
        .body { padding: 55px 20px 25px; text-align: center; }
        #display-name { font-size: 1.6rem; font-weight: bold; color: #4facfe; margin-bottom: 20px; }

        /* --- BOTONES --- */
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; transition: 0.3s; }
        .btn-edit { background: #1f2937; color: white; }
        .btn-share { background: #4facfe; color: white; }
        .btn-save { background: #00ff88; color: #000; width: 100%; margin-top: 10px; }
        
        /* --- EDITOR (OCULTO POR DEFECTO) --- */
        #editor { display: none; padding: 20px; background: #161d26; border-top: 1px solid #1f2937; text-align: left; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 0.7rem; color: #8696a0; text-transform: uppercase; }
        input[type="text"] { width: 100%; background: #0d1218; border: 1px solid #334155; padding: 8px; border-radius: 6px; color: #fff; margin-top: 5px; }
        input[type="file"] { font-size: 0.8rem; margin-top: 5px; color: #4facfe; }

        .logout { color: #ff3d00; cursor: pointer; font-size: 0.8rem; margin-top: 15px; display: inline-block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card">
        <div id="login-box" style="padding: 60px 30px; text-align: center;">
            <h1>CrizZapp</h1>
            <p style="color: #8696a0; margin: 20px 0;">Entra con Google para crear tu perfil</p>
            <button onclick="login()" class="btn btn-share" style="width: 100%">LOGIN GOOGLE</button>
        </div>

        <div id="main-box" class="hidden">
            <div class="header">
                <img id="view-banner" src="" class="banner">
                <div class="pfp-container">
                    <img id="view-pfp" src="" class="pfp">
                </div>
            </div>

            <div class="body">
                <div id="display-name">Usuario</div>
                
                <div class="btn-group" id="main-actions">
                    <button class="btn btn-edit" onclick="toggleEditor()">EDITAR</button>
                    <button class="btn btn-share" onclick="shareProfile()">COMPARTIR</button>
                </div>

                <div id="editor">
                    <div class="input-group">
                        <label>Apodo</label>
                        <input type="text" id="edit-name">
                    </div>
                    <div class="input-group">
                        <label>Foto de Perfil (Subir archivo)</label>
                        <input type="file" id="file-pfp" accept="image/*">
                    </div>
                    <div class="input-group">
                        <label>Banner (Subir archivo)</label>
                        <input type="file" id="file-banner" accept="image/*">
                    </div>
                    <button class="btn btn-save" onclick="saveData()">GUARDAR Y CERRAR</button>
                    <p onclick="toggleEditor()" style="text-align: center; font-size: 0.7rem; margin-top: 10px; cursor: pointer;">Cancelar</p>
                </div>

                <p onclick="logout()" class="logout">Cerrar Sesión</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
            authDomain: "ingresa-dfec2.firebaseapp.com",
            projectId: "ingresa-dfec2",
            storageBucket: "ingresa-dfec2.appspot.com",
            messagingSenderId: "441882283200",
            appId: "1:441882283200:web:8067df85facc2d67d77125"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); localStorage.clear(); location.reload(); }

        function toggleEditor() {
            const editor = document.getElementById('editor');
            const actions = document.getElementById('main-actions');
            const isVisible = editor.style.display === 'block';
            editor.style.display = isVisible ? 'none' : 'block';
            actions.style.display = isVisible ? 'flex' : 'none';
        }

        // Convierte archivos subidos a texto (Base64) para guardarlos en el navegador
        function readFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function saveData() {
            const name = document.getElementById('edit-name').value;
            const pfpFile = document.getElementById('file-pfp').files[0];
            const bannerFile = document.getElementById('file-banner').files[0];

            if(name) localStorage.setItem('crizz_name', name);
            if(pfpFile) localStorage.setItem('crizz_pfp', await readFile(pfpFile));
            if(bannerFile) localStorage.setItem('crizz_banner', await readFile(bannerFile));

            loadProfile();
            toggleEditor();
        }

        function loadProfile() {
            const user = auth.currentUser;
            if(!user) return;

            document.getElementById('display-name').innerText = localStorage.getItem('crizz_name') || user.displayName;
            document.getElementById('view-pfp').src = localStorage.getItem('crizz_pfp') || user.photoURL;
            document.getElementById('view-banner').src = localStorage.getItem('crizz_banner') || "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000&auto=format&fit=crop";
            
            document.getElementById('edit-name').value = localStorage.getItem('crizz_name') || user.displayName;
        }

        function shareProfile() {
            const name = document.getElementById('display-name').innerText;
            const url = window.location.href;
            navigator.clipboard.writeText(`¡Mira mi perfil de CrizZapp! Nombre: ${name} \nLink: ${url}`);
            alert("¡Link de perfil copiado al portapapeles!");
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('main-box').classList.remove('hidden');
                loadProfile();
            }
        });
    </script>
</body>
</html>
