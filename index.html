<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrizZapp | Social Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            margin: 0; font-family: sans-serif; background-color: #0b141a; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        header { width: 100%; max-width: 500px; background: #202c33; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00a884; position: sticky; top:0; z-index:100; }
        .mini-pfp { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #00a884; object-fit: cover; }
        
        /* CONTENEDOR DE PERFIL CORREGIDO */
        .profile-card { 
            background: #111b21; width: 95%; max-width: 420px; border-radius: 15px; 
            border: 1px solid #00a884; overflow: hidden; margin-top: 20px; position: relative;
        }

        .banner-container { width: 100%; height: 140px; background: #2a3942; overflow: hidden; }
        #v-banner { width: 100%; height: 100%; object-fit: cover; }

        .pfp-container { 
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 100px; z-index: 5;
        }
        #v-pfp { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 4px solid #111b21; object-fit: cover; background: #202c33;
        }

        .info-section { padding: 60px 20px 20px; text-align: center; }
        #v-name { font-size: 1.5rem; font-weight: bold; color: #00a884; margin-bottom: 5px; }
        #v-bio { color: #8696a0; font-size: 14px; margin-bottom: 15px; }
        
        .stats-row { display: flex; justify-content: center; gap: 15px; font-size: 13px; color: #00e676; margin-bottom: 15px; }

        .btn { padding: 12px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn-edit { background: transparent; color: white; border: 1px solid #00a884; }
        .btn-primary { background: #00a884; color: white; }

        /* POSTS GRID */
        .posts-grid { width: 95%; max-width: 420px; margin-top: 20px; padding-bottom: 100px; }
        .post-item { background: #111b21; border-radius: 10px; margin-bottom: 15px; border: 1px solid #2a3942; overflow: hidden; }
        .post-item img { width: 100%; display: block; }
        .post-caption { padding: 10px; font-size: 14px; color: #e9edef; }

        /* FAB */
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #00a884; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 50; }

        /* MODALES */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111b21; padding: 20px; border-radius: 15px; border: 1px solid #00a884; width: 100%; max-width: 380px; }
        input[type="text"], textarea { width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 8px; color: white; margin: 10px 0; outline: none; }
        .file-label { display: block; font-size: 12px; color: #00a884; margin: 10px 0 5px; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; color:#00a884; font-size: 1.2rem;">CrizZapp</div>
        <div id="nav-right"></div>
    </header>

    <div class="profile-card">
        <div class="banner-container">
            <img id="v-banner" src="">
        </div>
        <div class="pfp-container">
            <img id="v-pfp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
        <div class="info-section">
            <div id="v-name">Nombre</div>
            <div id="v-bio">Bio aquí...</div>
            <div class="stats-row">
                <span id="followers-count">0 Seguidores</span>
            </div>
            
            <div id="action-buttons">
                <button id="btn-edit-open" class="btn btn-edit hidden" onclick="openModal('modal-edit')">EDITAR PERFIL</button>
                <button id="btn-follow" class="btn btn-primary hidden" onclick="handleFollow()">SEGUIR</button>
            </div>
        </div>
    </div>

    <div class="posts-grid" id="posts-feed"></div>

    <button id="btn-add-post" class="fab hidden" onclick="openModal('modal-post')">+</button>

    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <h3 style="color:#00a884">Ajustes de Perfil</h3>
            <input type="text" id="in-name" placeholder="Tu Apodo">
            <textarea id="in-bio" placeholder="Tu descripción..."></textarea>
            
            <label class="file-label">FOTO DE PERFIL</label>
            <input type="file" id="in-pfp" accept="image/*">
            
            <label class="file-label">IMAGEN DE BANNER</label>
            <input type="file" id="in-banner" accept="image/*">
            
            <button class="btn btn-primary" onclick="updateProfile()">GUARDAR TODO</button>
            <button class="btn" style="color:#8696a0" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <div id="modal-post" class="modal">
        <div class="modal-content">
            <h3 style="color:#00a884">Nueva Publicación</h3>
            <label class="file-label">SELECCIONAR FOTO</label>
            <input type="file" id="in-post-img" accept="image/*">
            <textarea id="in-post-desc" placeholder="¿Qué estás pensando?"></textarea>
            <button class="btn btn-primary" onclick="createPost()">PUBLICAR</button>
            <button class="btn" style="color:#8696a0" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
        authDomain: "ingresa-dfec2.firebaseapp.com",
        databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
        projectId: "ingresa-dfec2",
        storageBucket: "ingresa-dfec2.appspot.com",
        messagingSenderId: "441882283200",
        appId: "1:441882283200:web:8067df85facc2d67d77125"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const profileId = urlParams.get('id');

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    const readerBase64 = f => new Promise(res => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.readAsDataURL(f);
    });

    async function updateProfile() {
        const user = auth.currentUser;
        const pFile = document.getElementById('in-pfp').files[0];
        const bFile = document.getElementById('in-banner').files[0];
        
        let up = { 
            name: document.getElementById('in-name').value, 
            bio: document.getElementById('in-bio').value 
        };
        
        if(pFile) up.pfp = await readerBase64(pFile);
        if(bFile) up.banner = await readerBase64(bFile);

        db.ref('perfiles_google/'+user.uid).update(up).then(() => location.reload());
    }

    async function createPost() {
        const user = auth.currentUser;
        const file = document.getElementById('in-post-img').files[0];
        const desc = document.getElementById('in-post-desc').value;
        if(!file) return alert("Sube una imagen");

        const b64 = await readerBase64(file);
        db.ref('posts/'+user.uid).push({ img: b64, desc, time: Date.now() }).then(() => location.reload());
    }

    function handleFollow() {
        const me = auth.currentUser;
        if(!me) return alert("Logueate primero");
        const ref = db.ref(`seguidores/${profileId}/${me.uid}`);
        ref.get().then(s => s.exists() ? ref.remove() : ref.set(true));
    }

    auth.onAuthStateChanged(user => {
        const activeId = profileId || (user ? user.uid : null);
        
        if(user) {
            document.getElementById('nav-right').innerHTML = `<img src="${user.photoURL}" class="mini-pfp" onclick="window.location.search=''">`;
            if(activeId === user.uid) document.getElementById('btn-add-post').classList.remove('hidden');
        }

        if(activeId) {
            // Datos Perfil
            db.ref('perfiles_google/'+activeId).on('value', snap => {
                const d = snap.val() || {};
                document.getElementById('v-name').innerText = d.name || "Usuario";
                document.getElementById('v-bio').innerText = d.bio || "Sin bio...";
                document.getElementById('v-pfp').src = d.pfp || "
