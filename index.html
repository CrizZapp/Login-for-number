<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrizZapp | Perfil</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #020406; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: 20px; }
        
        /* BARRA SUPERIOR */
        .navbar { width: 100%; max-width: 400px; display: flex; justify-content: flex-end; align-items: center; padding: 10px 20px; position: absolute; top: 0; z-index: 10; }
        .mini-pfp { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #4facfe; cursor: pointer; }
        .btn-nav { background: #4facfe; color: white; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }

        .card { background: #0d1218; border-radius: 20px; border: 1px solid #1f2937; width: 360px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 40px; }

        .header { position: relative; height: 140px; background: #1a222c; }
        .banner { width: 100%; height: 100%; object-fit: cover; }
        .pfp-container { position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); }
        .pfp { width: 100px; height: 100px; border-radius: 50%; border: 5px solid #0d1218; object-fit: cover; background: #1a222c; }

        .body { padding: 55px 20px 25px; text-align: center; }
        #display-name { font-size: 1.6rem; font-weight: bold; color: #4facfe; margin-bottom: 20px; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; transition: 0.3s; }
        .btn-edit { background: #1f2937; color: white; }
        .btn-share { background: #4facfe; color: white; }
        
        #editor { display: none; padding: 20px; background: #161d26; border-top: 1px solid #1f2937; text-align: left; }
        input[type="text"] { width: 100%; background: #0d1218; border: 1px solid #334155; padding: 10px; border-radius: 6px; color: #fff; margin-top: 5px; margin-bottom: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="navbar">
        <button id="nav-login" class="btn-nav" onclick="login()">INICIAR SESIÓN</button>
        <div id="nav-user" class="hidden" onclick="window.location.search = ''">
            <img id="nav-pfp" src="" class="mini-pfp">
        </div>
    </div>

    <div class="card">
        <div class="header">
            <img id="view-banner" src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000" class="banner">
            <div class="pfp-container">
                <img id="view-pfp" src="" class="pfp">
            </div>
        </div>

        <div class="body">
            <div id="display-name">Usuario</div>
            
            <div class="btn-group" id="main-actions">
                <button id="btn-edit-toggle" class="btn btn-edit hidden" onclick="toggleEditor()">EDITAR</button>
                <button class="btn btn-share" onclick="shareProfile()">COMPARTIR PERFIL</button>
            </div>

            <div id="editor">
                <label style="font-size: 0.7rem; color: #8696a0;">NOMBRE/APODO</label>
                <input type="text" id="edit-name">
                <label style="font-size: 0.7rem; color: #8696a0;">URL FOTO PERFIL</label>
                <input type="text" id="edit-pfp">
                <label style="font-size: 0.7rem; color: #8696a0;">URL BANNER</label>
                <input type="text" id="edit-banner">
                <button class="btn btn-share" style="width:100%" onclick="saveData()">GUARDAR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
            authDomain: "ingresa-dfec2.firebaseapp.com",
            projectId: "ingresa-dfec2",
            storageBucket: "ingresa-dfec2.appspot.com",
            messagingSenderId: "441882283200",
            appId: "1:441882283200:web:8067df85facc2d67d77125"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function toggleEditor() {
            const ed = document.getElementById('editor');
            ed.style.display = (ed.style.display === 'block') ? 'none' : 'block';
        }

        function saveData() {
            localStorage.setItem('c_name', document.getElementById('edit-name').value);
            localStorage.setItem('c_pfp', document.getElementById('edit-pfp').value);
            localStorage.setItem('c_banner', document.getElementById('edit-banner').value);
            location.reload();
        }

        function shareProfile() {
            const name = encodeURIComponent(document.getElementById('display-name').innerText);
            const pfp = encodeURIComponent(document.getElementById('view-pfp').src);
            const banner = encodeURIComponent(document.getElementById('view-banner').src);
            
            // Crea un link con los datos incluidos
            const shareLink = `${window.location.origin}${window.location.pathname}?u=${name}&p=${pfp}&b=${banner}`;
            
            navigator.clipboard.writeText(shareLink);
            alert("¡Link único de tu perfil copiado!");
        }

        // LÓGICA DE CARGA (¿Soy yo o es un perfil compartido?)
        auth.onAuthStateChanged(user => {
            const params = new URLSearchParams(window.location.search);
            const sharedName = params.get('u');
            
            if (user) {
                document.getElementById('nav-login').classList.add('hidden');
                document.getElementById('nav-user').classList.remove('hidden');
                document.getElementById('nav-pfp').src = user.photoURL;
                document.getElementById('btn-edit-toggle').classList.remove('hidden');
            }

            if (sharedName) {
                // VIENDO PERFIL COMPARTIDO
                document.getElementById('display-name').innerText = sharedName;
                document.getElementById('view-pfp').src = params.get('p');
                document.getElementById('view-banner').src = params.get('b');
                document.getElementById('btn-edit-toggle').classList.add('hidden'); // No puedes editar el perfil de otro
            } else if (user) {
                // MI PROPIO PERFIL
                const name = localStorage.getItem('c_name') || user.displayName;
                const pfp = localStorage.getItem('c_pfp') || user.photoURL;
                const banner = localStorage.getItem('c_banner') || "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000";
                
                document.getElementById('display-name').innerText = name;
                document.getElementById('view-pfp').src = pfp;
                document.getElementById('view-banner').src = banner;

                document.getElementById('edit-name').value = name;
                document.getElementById('edit-pfp').value = pfp;
                document.getElementById('edit-banner').value = banner;
            }
        });
    </script>
</body>
</html>
