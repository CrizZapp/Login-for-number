<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrizZapp | Acceso</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:sans-serif;
background:#020406;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#0d1218;
padding:30px;
border-radius:15px;
border:2px solid #4facfe;
text-align:center;
width:320px;
}

h1{
color:#4facfe;
margin-bottom:15px;
text-shadow:0 0 10px #4facfe;
}

.btn{
background:#fff;
color:#000;
border:none;
padding:12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:10px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h1>CrizZapp</h1>

<p style="margin-bottom:20px;color:#8696a0;">
Inicia sesión para continuar
</p>

<button class="btn" onclick="loginGoogle()">
ENTRAR CON GOOGLE
</button>

<p style="margin:15px 0;color:#8696a0;">
o continuar con teléfono
</p>

<input id="phone" placeholder="+598XXXXXXXX">

<button class="btn" onclick="sendCode()">
ENVIAR CÓDIGO
</button>

<input id="code" placeholder="Código SMS">

<button class="btn" onclick="verifyCode()">
VERIFICAR CÓDIGO
</button>

<!-- CAPTCHA -->
<div id="recaptcha-container" style="margin-top:15px;"></div>

</div>

</body>
</html>
